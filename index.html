<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú Interactivo de Cocina</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #f4f6f9;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background-color: #ffffff;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 480px;
            padding: 25px;
            text-align: center;
        }
        h1 {
            color: #2c3e50;
            font-size: 24px;
            margin-bottom: 10px;
        }
        p.subtitle {
            color: #7f8c8d;
            font-size: 14px;
            margin-bottom: 25px;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }
        button {
            flex: 1;
            padding: 12px 15px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-few {
            background-color: #e67e22;
            color: white;
        }
        .btn-few:hover { background-color: #d35400; }
        .btn-many {
            background-color: #2ecc71;
            color: white;
        }
        .btn-many:hover { background-color: #27ae60; }
        #recipe-display {
            background-color: #f8f9fa;
            border-left: 4px solid #3498db;
            border-radius: 0 8px 8px 0;
            padding: 20px;
            text-align: left;
            min-height: 150px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .recipe-title {
            font-size: 18px;
            color: #2c3e50;
            font-weight: bold;
            margin-bottom: 8px;
        }
        .recipe-type {
            display: inline-block;
            font-size: 11px;
            text-transform: uppercase;
            font-weight: bold;
            padding: 3px 8px;
            border-radius: 12px;
            margin-bottom: 12px;
        }
        .type-few { background-color: #fdebd0; color: #b9770e; }
        .type-many { background-color: #d5f5e3; color: #1e8449; }
        .ingredients-list {
            font-size: 14px;
            color: #555;
            line-height: 1.5;
            padding-left: 20px;
        }
        .footer-note {
            margin-top: 25px;
            font-size: 11px;
            color: #bdc3c7;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>¿Qué cocinamos hoy? 🍳</h1>
    <p class="subtitle">Para mamá y Gaby. Toca un botón para ver una idea genial.</p>
    
    <div class="btn-group">
        <button class="btn-few" onclick="getRandomRecipe('few')">Pocos Ingredientes</button>
        <button class="btn-many" onclick="getRandomRecipe('many')">Mercado Completo</button>
    </div>
    
    <div id="recipe-display">
        <p style="text-align: center; color: #95a5a6; font-style: italic;">Presiona un botón para sugerir una receta...</p>
    </div>

    <div class="footer-note">Hecho con el corazón en VS Code</div>
</div>

<script>
    const recipes = {
        few: [
            {
                title: "Arroz con Huevo Perico y Tajadas",
                ingredients: ["Arroz blanco caliente", "Huevos revueltos con sofrito (cebolla y tomate)", "Plátano maduro en tajadas", "Aguacate (si hay)"]
            },
            {
                title: "Pasta al Burro con Queso",
                ingredients: ["Pasta de tu preferencia", "Mantequilla y un toque de ajo sofrito", "Queso blanco rallado por encima", "Rodajas de tomate fresco con sal"]
            },
            {
                title: "Tortilla Española Casera",
                ingredients: ["Papas cortadas en cubos y cocidas", "Huevos batidos", "Cebolla y tomate picados", "Todo se mezcla y se dora por ambos lados en la sartén"]
            },
            {
                title: "Calentado Express",
                ingredients: ["Arroz que haya quedado del día anterior", "Fríjoles, lentejas o carne picada sobrante", "Todo sofrito en la sartén", "Huevo frito encima con la yema blanda"]
            },
            {
                title: "Sandwich de Atún Supremo",
                ingredients: ["Pan (tajado o francés)", "Lata de atún mezclada con un toque de mayonesa", "Cebolla finamente picada", "Rodajas de tomate y lechuga"]
            },
            {
                title: "Arroz Atunero Rápido",
                ingredients: ["Arroz blanco", "Atún en aceite o agua", "Cebolla y tomate sofritos para darle sabor", "Maicitos tiernos (opcional)"]
            },
            {
                title: "Sopa de Guineo o Papa Cortada",
                ingredients: ["Papas o guineos verdes picados en cuadritos", "Caldo base con cebolla, ajo y color", "Huevo batido incorporado al final", "Cilantro fresco"]
            },
            {
                title: "Arepa con Todo",
                ingredients: ["Arepa de maíz tostada con mantequilla", "Queso blanco derretido o rallado", "Huevo frito o revuelto encima", "Hogao (sofrito de tomate y cebolla)"]
            }
        ],
        many: [
            {
                title: "Pechuga Completa de Mercado",
                ingredients: ["Pechuga de pollo a la plancha", "Arroz blanco", "Fríjoles o lentejas", "Ensalada fresca de espinaca con zanahoria rallada"]
            },
            {
                title: "Pasta Boloñesa con Puré",
                ingredients: ["Pasta con carne molida guisada en salsa de tomate natural", "Puré de papa cremoso", "Aguacate en cubos"]
            },
            {
                title: "Sopa Reconfortante de Pollo",
                ingredients: ["Pollo desmechado", "Papa y zanahoria picadas", "Caldo con sofrito de cebolla", "Cilantro fresco picado al final"]
            },
            {
                title: "Carne en Salsa con Papas Chorreadas",
                ingredients: ["Filete de carne cocinado en su jugo con cebolla y tomate", "Papas cocidas bañadas en salsa de queso y hogao", "Arroz blanco", "Ensalada de aguacate"]
            },
            {
                title: "Seco de Lentejas con Chicharrón o Chorizo",
                ingredients: ["Lentejas bien sazonadas", "Arroz blanco", "Chorizo o chicharrón crujiente", "Tajadas de plátano maduro", "Ensalada de lechuga"]
            },
            {
                title: "Pollo al Sudado Tradicional",
                ingredients: ["Presas de pollo cocinadas con papa, yuca y plátano maduro en un mismo guiso", "Salsa espesa de tomate, cebolla y ajo", "Arroz blanco para acompañar"]
            },
            {
                title: "Carne Molida con Arroz y Maduro",
                ingredients: ["Carne molida bien sazonada con ajo y cebolla", "Arroz blanco", "Plátano maduro asado o en tajadas", "Huevo frito y aguacate"]
            },
            {
                title: "Ensalada Rusa con Pollo Desmechado",
                ingredients: ["Papas y zanahorias cocidas en cubitos con arvejas", "Mezclado todo con mayonesa", "Pollo desmechado integrado o al lado", "Arroz blanco"]
            }
        ]
    };

    function getRandomRecipe(type) {
        const list = recipes[type];
        const randomIndex = Math.floor(Math.random() * list.length);
        const recipe = list[randomIndex];
        
        const display = document.getElementById('recipe-display');
        const typeClass = type === 'few' ? 'type-few' : 'type-many';
        const typeText = type === 'few' ? 'Pocos Ingredientes (Desvare)' : 'Mercado Completo';

        let ingredientsHTML = '<ul class="ingredients-list">';
        recipe.ingredients.forEach(ing => {
            ingredientsHTML += `<li>${ing}</li>`;
        });
        ingredientsHTML += '</ul>';

        display.innerHTML = `
            <span class="recipe-type ${typeClass}">${typeText}</span>
            <div class="recipe-title">${recipe.title}</div>
            ${ingredientsHTML}
        `;
    }
</script>

</body>
</html>
