<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú Gourmet para Mamá y Gaby</title>
    <style>
        :root {
            --primary-few: #e67e22;
            --primary-many: #2ecc71;
            --text-main: #2c3e50;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: grid;
            place-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 450px;
            transition: transform 0.3s ease;
        }

        h1 { color: var(--text-main); margin-bottom: 0.5rem; }
        
        .btn-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; }
        
        button {
            padding: 12px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            color: white;
            transition: filter 0.2s, transform 0.1s;
        }

        button:active { transform: scale(0.98); }
        .btn-few { background-color: var(--primary-few); }
        .btn-many { background-color: var(--primary-many); }

        #display {
            min-height: 220px;
            padding: 15px;
            border-radius: 12px;
            background: #f8f9fa;
            border-left: 5px solid #ccc;
            transition: all 0.4s ease;
            opacity: 0;
            transform: translateY(10px);
        }

        #display.active { opacity: 1; transform: translateY(0); }
        .recipe-title { font-size: 1.2rem; font-weight: bold; margin-bottom: 10px; color: #333; }
        .ingredients-list { list-style-type: none; padding: 0; }
        .ingredients-list li { margin-bottom: 5px; font-size: 0.95rem; color: #666; }
        .ingredients-list li::before { content: "•"; color: var(--primary-few); margin-right: 8px; }
    </style>
</head>
<body>

<div class="card">
    <h1>¿Qué cocinamos? 🍳</h1>
    <p>Sugerencias para el día a día.</p>
    
    <div class="btn-container">
        <button class="btn-few" onclick="updateRecipe('few')">Desvare</button>
        <button class="btn-many" onclick="updateRecipe('many')">Cocina Pro</button>
    </div>

    <div id="display">
        <p style="text-align: center; color: #aaa;">Elige una opción para ver la receta...</p>
    </div>
</div>

<script>
    const recipes = {
        few: [
            { title: "Arroz con Huevo y Tajadas", ingredients: ["Arroz blanco", "Huevo revuelto con sofrito", "Plátano maduro"] },
            { title: "Pasta al Burro", ingredients: ["Pasta corta", "Mantequilla y ajo", "Queso fresco"] }
        ],
        many: [
            { title: "Pechuga al estilo Gourmet", ingredients: ["Pechuga a la plancha", "Ensalada de espinaca", "Puré de papa"] },
            { title: "Sudado Tradicional", ingredients: ["Pollo en piezas", "Papa y yuca", "Hogao casero"] }
        ]
    };

    function updateRecipe(type) {
        const display = document.getElementById('display');
        const list = recipes[type];
        const recipe = list[Math.floor(Math.random() * list.length)];
        
        // Animación de salida y entrada
        display.classList.remove('active');
        
        setTimeout(() => {
            display.style.borderLeftColor = type === 'few' ? '#e67e22' : '#2ecc71';
            display.innerHTML = `
                <div class="recipe-title">${recipe.title}</div>
                <ul class="ingredients-list">
                    ${recipe.ingredients.map(ing => `<li>${ing}</li>`).join('')}
                </ul>
            `;
            display.classList.add('active');
        }, 200);
    }
</script>

</body>
</html>
